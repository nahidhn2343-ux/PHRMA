<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions | PHRMA Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .sidebar-item.active { background-color: #D9F99D; color: #064E3B; font-weight: 700; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .prescription-img { transition: transform 0.3s ease; transform-origin: center; }

        /* কাস্টম স্ক্রলবার */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #064E3B; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 overflow-hidden"> <div class="flex h-screen overflow-hidden"> <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6 h-full flex-shrink-0">
            <div class="mb-10 px-2 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#064E3B] rounded-xl flex items-center justify-center text-white font-bold text-xl">P</div>
                <h1 class="text-xl font-black tracking-tight text-[#064E3B]">PHRMA</h1>
            </div>
            <nav class="flex-1 space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">Menu</p>
                <a href="admin.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-truck-fast w-5 text-center"></i>
                    <span class="text-sm font-medium">Live Orders</span>
                </a>
                <a href="manage-products.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-pills w-5 text-center"></i>
                    <span class="text-sm">Manage Products</span>
                </a>
                <a href="prescriptions.html" class="sidebar-item active flex items-center space-x-3 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-file-medical w-5 text-center"></i>
                    <span class="text-sm font-medium">Prescriptions</span>
                </a>
                <a href="offers.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-tags w-5 text-center"></i>
                    <span class="text-sm font-medium">Offers</span>
                </a>
                <a href="customers.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-users w-5 text-center"></i>
                    <span class="text-sm font-medium">Customers</span>
                </a>
            </nav>
             <div class="mt-auto pt-6 border-t border-slate-50">
                <a href="login.html" class="flex items-center space-x-3 text-rose-500 font-bold text-sm px-2 hover:opacity-80">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto h-full">
            <div class="mb-10">
                <h2 class="text-2xl font-bold text-slate-900">Prescription Requests</h2>
                <p class="text-slate-400 text-sm">Review and approve customer prescriptions</p>
            </div>

            <div class="bg-white rounded-[32px] border border-slate-100 card-shadow overflow-hidden mb-10">
                <div class="overflow-x-auto px-4 py-4">
                    <div class="relative mb-4 px-2">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-3 text-slate-300 text-sm"></i>
                        <input type="text" placeholder="Find a Prescriptions..." class="pl-10 pr-4 py-3 bg-slate-50 border-none rounded-xl text-xs outline-none focus:ring-2 ring-emerald-500/20 w-64">
                    </div>

                    <table class="w-full text-left border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Date</th>
                                <th class="px-6 py-4">User Name</th>
                                <th class="px-6 py-4">Phone</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="prescription-list" class="text-sm">
                            </tbody>
                    </table>
                </div>
                <div id="no-data" class="py-20 text-center hidden">
                    <i class="fa-solid fa-file-circle-question text-slate-200 text-6xl mb-4"></i>
                    <p class="text-slate-400 font-medium">No prescription requests available.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="rx-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl relative overflow-hidden flex flex-col max-h-[90vh]">
            
            <div class="px-10 py-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-black text-slate-900">Review Prescription</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-rose-500 transition-all">
                    <i class="fa-solid fa-circle-xmark text-2xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-10 grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-8">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-600 mb-4">Patient Information</p>
                        <div class="grid grid-cols-2 gap-6" id="modal-user-info">
                            </div>
                    </div>
                    <div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                        <label class="text-[10px] font-black text-emerald-700 uppercase tracking-widest block mb-2">Delivery Address</label>
                        <p id="modal-address" class="text-sm font-bold text-[#064E3B] leading-relaxed">Address will appear here...</p>
                    </div>
                </div>

                <div class="bg-slate-100 rounded-[2rem] overflow-hidden relative group min-h-[400px] flex items-center justify-center">
                    <img id="rx-image" src="" class="prescription-img max-w-full h-auto object-contain p-4" alt="Prescription">
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 bg-white/90 backdrop-blur px-4 py-2 rounded-2xl shadow-xl">
                        <button onclick="zoomImage(0.1)" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-600 transition-all"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                        <button onclick="zoomImage(-0.1)" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-600 transition-all"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                        <button onclick="rotateImage()" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-600 transition-all"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t border-slate-50 flex gap-4">
                <button onclick="updateStatus('Rejected')" class="flex-1 bg-rose-50 text-rose-600 font-bold py-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all">Reject Request</button>
                <button onclick="updateStatus('Confirmed')" class="flex-[2] bg-[#064E3B] text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-emerald-800 transition-all">Approve & Send Confirmation</button>
            </div>
        </div>
    </div>

    <script>
        let currentRequestId = null;

        function updateStatus(newStatus) {
            if(currentRequestId) {
                alert(`Request ${currentRequestId} has been ${newStatus}`);
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('rx-modal').classList.add('hidden');
        }

        let scale = 1; let rotation = 0;
        function zoomImage(amount) { scale += amount; updateImageStyle(); }
        function rotateImage() { rotation += 90; updateImageStyle(); }
        function updateImageStyle() {
            const img = document.getElementById('rx-image');
            img.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        }
    </script>
    <script type="module" src="prescriptions.js"></script>
</body>
</html>

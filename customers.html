<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management | PHRMA Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .sidebar-item.active { background-color: #D9F99D; color: #064E3B; font-weight: 700; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }

        /* Custom Scrollbar Design */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #064E3B; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 overflow-hidden"> 
    <div class="flex h-screen overflow-hidden"> 
        <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6 h-full flex-shrink-0">
            <div class="mb-10 px-2 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#064E3B] rounded-xl flex items-center justify-center text-white font-bold text-xl">P</div>
                <h1 class="text-xl font-black tracking-tight text-[#064E3B]">PHRMA</h1>
            </div>
            
            <nav class="flex-1 space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">Menu</p>
                <a href="admin.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-truck-fast w-5 text-center"></i>
                    <span class="text-sm font-medium">Live Orders</span>
                </a>
                <a href="manage-products.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-pills w-5 text-center"></i>
                    <span class="text-sm font-medium">Manage Products</span>
                </a>
                <a href="prescriptions.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-file-medical w-5 text-center"></i>
                    <span class="text-sm font-medium">Prescriptions</span>
                </a>
                <a href="offers.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-tags w-5 text-center"></i>
                    <span class="text-sm font-medium">Offers</span>
                </a>
                <a href="customers.html" class="sidebar-item active flex items-center space-x-3 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-users w-5 text-center"></i>
                    <span class="text-sm">Users</span>
                </a>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-50">
                <a href="login.html" class="flex items-center space-x-3 text-rose-500 font-bold text-sm px-2 hover:opacity-80">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto h-full"> 
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">User Management</h2>
                    <p class="text-slate-400 text-sm">Monitor and manage all registered users</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-8 rounded-[32px] border border-slate-100 card-shadow flex items-center gap-6">
                    <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center text-[#064E3B] text-2xl">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total Registered Users</p>
                        <h3 id="total-users-count" class="text-4xl font-black text-slate-900 mt-1">0</h3>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[32px] border border-slate-100 card-shadow overflow-hidden mb-10">
                <div class="px-8 py-6 border-b border-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-slate-800">All Customers</h3>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-300 text-sm"></i>
                        <input type="text" id="user-search" placeholder="Search by name or email..." class="pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-xs outline-none focus:ring-2 ring-emerald-500/20 w-64">
                    </div>
                </div>
                
                <div class="overflow-x-auto px-4 pb-4">
                    <table class="w-full text-left border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                                <th class="px-6 py-4">User Details</th>
                                <th class="px-6 py-4">Joined Date</th>
                                <th class="px-6 py-4">Role</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-body" class="text-sm">
                            </tbody>
                    </table>

                    <div id="no-users" class="py-20 text-center hidden">
                        <i class="fa-solid fa-user-slash text-slate-100 text-6xl mb-4"></i>
                        <p class="text-slate-400 font-medium">No users found in the database.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from "./script.js";
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const userListBody = document.getElementById('user-list-body');
        const totalCountEl = document.getElementById('total-users-count');
        const noUsersEl = document.getElementById('no-users');
        const searchInput = document.getElementById('user-search');

        let allUsers = [];

        // Real-time listener for users
        const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            allUsers = [];
            snapshot.forEach((doc) => {
                allUsers.push({ id: doc.id, ...doc.data() });
            });
            renderUsers(allUsers);
        }, (error) => {
            console.error("Error fetching users:", error);
        });

        function renderUsers(users) {
            totalCountEl.innerText = users.length;
            
            if (users.length === 0) {
                userListBody.innerHTML = '';
                noUsersEl.classList.remove('hidden');
                return;
            }

            noUsersEl.classList.add('hidden');
            userListBody.innerHTML = users.map(user => `
                <tr class="bg-white hover:bg-slate-50 transition-all">
                    <td class="px-6 py-4 rounded-l-2xl border-y border-l border-slate-50">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-bold">
                                ${user.fullName ? user.fullName.charAt(0) : 'U'}
                            </div>
                            <div>
                                <p class="font-bold text-slate-900">${user.fullName || 'Anonymous'}</p>
                                <p class="text-slate-400 text-xs">${user.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 border-y border-slate-50 text-slate-500 font-medium">
                        ${user.joinedDate || 'N/A'}
                    </td>
                    <td class="px-6 py-4 border-y border-slate-50 font-semibold text-slate-600">
                        ${user.role || 'Customer'}
                    </td>
                    <td class="px-6 py-4 border-y border-slate-50">
                        <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-full uppercase tracking-widest">
                            ${user.status || 'Active'}
                        </span>
                    </td>
                    <td class="px-6 py-4 rounded-r-2xl border-y border-r border-slate-50 text-right">
                        <button onclick="blockUser('${user.id}')" class="w-8 h-8 text-slate-300 hover:text-rose-500 transition-colors">
                            <i class="fa-solid fa-ban"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Search Filter Logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.fullName?.toLowerCase().includes(term) || 
                u.email?.toLowerCase().includes(term)
            );
            renderUsers(filtered);
        });

        // Block logic (can be expanded later)
        window.blockUser = (userId) => {
            if(confirm("Are you sure you want to block this user?")) {
                alert("Action performed for user ID: " + userId);
            }
        };
    </script>
</body>
</html>

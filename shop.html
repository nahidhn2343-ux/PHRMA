<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | PHRMA Online Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="manifest" href="site.webmanifest" />
    <style>
        #mobile-category-list.hidden { display: none; }
        .rotate-180 { transform: rotate(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="img/phrma2.png" alt="PHRMA" class="h-20 w-auto rounded">
            </a>
            <div class="hidden lg:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-teal-600 transition">Home</a>
                <a href="shop.html" class="text-teal-600 font-bold">Shop</a>
                <a href="upload.html" class="hover:text-teal-600 transition">Upload</a>
                <a href="offer.html" class="hover:text-teal-600 transition">Offers</a>
                <a href="about-us.html" class="hover:text-teal-600 transition">About Us</a>
            </div>
            <div class="flex items-center space-x-4 md:space-x-6">
                <a href="login.html"><button class="px-4 md:px-6 py-2 bg-gradient-to-r from-teal-500 to-emerald-600 text-white font-bold rounded-xl shadow-lg hover:scale-105 transition-all">Login</button></a>
                <a href="cart.html" class="relative group">
                    <i class="fa-solid fa-cart-shopping text-xl text-gray-400 group-hover:text-teal-600 transition"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                </a>
                <button id="menu-btn" class="lg:hidden text-2xl text-gray-700"><i class="fa-solid fa-bars-staggered"></i></button>
            </div>
        </div>
    </nav>

    <section class="bg-teal-50 py-10 border-b border-teal-100">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">Browse <span class="text-teal-600">Authentic</span> Medicines</h1>
            <p class="text-gray-500 mb-8">Find your daily healthcare essentials and get them delivered fast.</p>
            <div class="max-w-2xl mx-auto">
                <div class="flex bg-white p-2 rounded-2xl border-2 border-transparent focus-within:border-teal-500 shadow-md transition-all">
                    <input type="text" id="shopSearch" placeholder="Search medicines, vitamins, baby care..." class="flex-1 bg-transparent px-4 outline-none text-gray-700">
                    <button class="bg-teal-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-teal-700 transition">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12 flex flex-col lg:flex-row gap-8">
        <aside class="w-full lg:w-1/4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:sticky lg:top-24">
                <div id="category-trigger" class="flex justify-between items-center cursor-pointer lg:cursor-default">
                    <h3 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-filter text-teal-600"></i> Categories</h3>
                    <i id="dropdown-icon" class="fa-solid fa-chevron-down text-gray-400 lg:hidden transition-transform duration-300"></i>
                </div>
                <div id="category-list-container" class="hidden lg:block mt-6">
                    <div class="space-y-4" id="category-list">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="category" value="All Products" checked onchange="filterByCategory('All Products')" class="w-4 h-4 text-teal-600">
                            <span class="text-gray-600 group-hover:text-teal-600 transition">All Products</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="category" value="Medicines" onchange="filterByCategory('Medicines')" class="w-4 h-4 text-teal-600">
                            <span class="text-gray-600 group-hover:text-teal-600 transition">Medicines</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="category" value="Baby Care" onchange="filterByCategory('Baby Care')" class="w-4 h-4 text-teal-600">
                            <span class="text-gray-600 group-hover:text-teal-600 transition">Baby Care</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="category" value="Wellness" onchange="filterByCategory('Wellness')" class="w-4 h-4 text-teal-600">
                            <span class="text-gray-600 group-hover:text-teal-600 transition">Wellness</span>
                        </label>
                    </div>
                </div>
            </div>
        </aside>

        <section class="w-full lg:w-3/4">
            <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
            <div id="no-results" class="hidden text-center py-20">
                <i class="fa-solid fa-box-open text-5xl text-gray-200 mb-4"></i>
                <p class="text-gray-500 italic">No products found matching your search.</p>
            </div>
        </section>
    </main>

    <div id="product-detail-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 md:p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeProductModal()"></div>
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl relative overflow-hidden flex flex-col md:flex-row z-10 max-h-[90vh]">
            <button onclick="closeProductModal()" class="absolute top-4 right-4 text-gray-400 hover:text-rose-500 z-30 bg-white rounded-full p-1 shadow-sm">
                <i class="fa-solid fa-circle-xmark text-3xl"></i>
            </button>
            <div class="w-full md:w-1/2 bg-gray-50 flex items-center justify-center p-6 md:p-12 flex-shrink-0">
                <img id="modal-product-img" src="" alt="" class="max-h-60 md:max-h-80 w-auto object-contain drop-shadow-2xl">
            </div>
            <div class="w-full md:w-1/2 flex flex-col flex-1 overflow-hidden">
                <div class="p-6 md:p-10 overflow-y-auto flex-1 custom-scrollbar">
                    <span id="modal-product-cat" class="text-teal-600 font-black text-xs uppercase tracking-widest mb-2 inline-block">Category</span>
                    <h3 id="modal-product-name" class="text-2xl md:text-3xl font-black text-slate-900 mb-4">Product Name</h3>
                    <div id="modal-product-about" class="text-slate-500 leading-relaxed text-sm space-y-4"></div>
                </div>
                <div class="p-6 md:p-10 border-t border-gray-50 bg-white flex-shrink-0">
                    <div class="flex items-center justify-between mb-6">
                        <div class="text-3xl font-black text-teal-600">৳ <span id="modal-product-price">0.00</span></div>
                        <div class="text-xs text-emerald-600 font-bold bg-emerald-50 px-3 py-1 rounded-full italic">In Stock</div>
                    </div>
                    <button id="modal-add-to-cart" class="w-full bg-[#064E3B] text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-emerald-800 transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-cart-plus"></i> Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-gray-100 pt-16 pb-8">
        </footer>

    <script type="module" src="script.js"></script>
    <script>
        // মোবাইল ড্রপডাউন লজিক
        document.getElementById('category-trigger').addEventListener('click', function() {
            if (window.innerWidth < 1024) {
                const list = document.getElementById('category-list-container');
                const icon = document.getElementById('dropdown-icon');
                list.classList.toggle('hidden');
                icon.classList.toggle('rotate-180');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHRMA | Manage Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="product.css">
</head>
<body class="text-slate-800 bg-[#F8FAFC]">

    <div class="flex min-h-screen">
        <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6">
            <div class="mb-10 px-2 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#064E3B] rounded-xl flex items-center justify-center text-white font-bold text-xl">P</div>
                <h1 class="text-xl font-black tracking-tight text-[#064E3B]">PHRMA</h1>
            </div>
            <nav class="flex-1 space-y-2">
                <a href="admin.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-grid-2 w-5 text-center"></i>
                    <span class="text-sm font-medium">Live Orders</span>
                </a>
                <a href="#" class="flex items-center space-x-3 bg-[#D9F99D] text-[#064E3B] p-3 rounded-2xl font-bold shadow-sm">
                    <i class="fa-solid fa-pills w-5 text-center"></i>
                    <span class="text-sm">Manage Products</span>
                </a>
                </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">Product Management</h2>
                    <p class="text-slate-400 text-sm">Add, Edit or Remove items from your inventory</p>
                </div>
                <button onclick="openModal()" class="bg-[#064E3B] text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 hover:opacity-90 shadow-lg shadow-emerald-900/10 transition-all">
                    <i class="fa-solid fa-plus"></i> Add Product
                </button>
            </div>

            <div class="bg-white rounded-[32px] border border-slate-100 card-shadow overflow-hidden">
                <div class="overflow-x-auto p-4">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                                <th class="px-4 py-5">Image</th>
                                <th class="px-4 py-5">Product Details</th>
                                <th class="px-4 py-5">Price</th>
                                <th class="px-4 py-5">Offer</th>
                                <th class="px-4 py-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="product-list" class="divide-y divide-slate-50 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-[32px] p-8 card-shadow scale-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-[#064E3B]">Add New Product</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="productForm" class="space-y-4">
                <input type="hidden" id="productId">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Product Name</label>
                    <input type="text" id="name" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500/20 mt-1" placeholder="Enter medicine name">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Price ($)</label>
                        <input type="number" id="price" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500/20 mt-1" placeholder="12.00">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Offer (%)</label>
                        <input type="number" id="offer" value="0" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500/20 mt-1">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Image URL</label>
                    <input type="text" id="imageUrl" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500/20 mt-1" placeholder="https://example.com/image.jpg">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Description</label>
                    <textarea id="desc" rows="3" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500/20 mt-1" placeholder="Write about product..."></textarea>
                </div>
                <button type="submit" class="w-full bg-[#064E3B] text-white py-4 rounded-2xl font-bold mt-4 hover:opacity-90 shadow-lg shadow-emerald-900/10">Save Product</button>
            </form>
        </div>
    </div>

    <script type="module" src="product.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Offers | PHRMA Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .sidebar-item.active { background-color: #D9F99D; color: #064E3B; font-weight: 700; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #064E3B; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 overflow-hidden"> 
    <div class="flex h-screen overflow-hidden"> 
        <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6 h-full flex-shrink-0">
            <div class="mb-10 px-2 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#064E3B] rounded-xl flex items-center justify-center text-white font-bold text-xl">P</div>
                <h1 class="text-xl font-black tracking-tight text-[#064E3B]">PHRMA</h1>
            </div>
            
            <nav class="flex-1 space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">Menu</p>
                <a href="admin.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-truck-fast w-5 text-center"></i>
                    <span class="text-sm font-medium">Live Orders</span>
                </a>
                <a href="manage-products.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-pills w-5 text-center"></i>
                    <span class="text-sm font-medium">Manage Products</span>
                </a>
                <a href="prescriptions.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-file-medical w-5 text-center"></i>
                    <span class="text-sm font-medium">Prescriptions</span>
                </a>
                <a href="offers.html" class="sidebar-item active flex items-center space-x-3 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-tags w-5 text-center"></i>
                    <span class="text-sm">Offers</span>
                </a>
                <a href="customers.html" class="flex items-center space-x-3 text-slate-500 hover:bg-slate-50 p-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-users w-5 text-center"></i>
                    <span class="text-sm font-medium">Customers</span>
                </a>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-50">
                <a href="login.html" class="flex items-center space-x-3 text-rose-500 font-bold text-sm px-2 hover:opacity-80">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto h-full">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">Manage Offers</h2>
                    <p class="text-slate-400 text-sm">Create and manage promotional discounts</p>
                </div>
                
                <button onclick="toggleModal('offer-modal')" class="bg-[#064E3B] text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 hover:bg-emerald-800 transition-all card-shadow">
                    <i class="fa-solid fa-plus"></i> Add Offer
                </button>
            </div>

            <div class="bg-white rounded-[32px] border border-slate-100 card-shadow overflow-hidden mb-10">
                <div class="overflow-x-auto px-4 py-4">
                    <div class="relative mb-4 px-2">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-3 text-slate-300 text-sm"></i>
                        <input type="text" placeholder="Search Product..." class="pl-10 pr-4 py-3 bg-slate-50 border-none rounded-xl text-xs outline-none focus:ring-2 ring-emerald-500/20 w-64">
                    </div>

                    <table class="w-full text-left border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                                <th class="px-6 py-4">Product</th>
                                <th class="px-6 py-4">Original Price</th>
                                <th class="px-6 py-4">Offer (%)</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="offer-list" class="text-sm"></tbody>
                    </table>
                </div>
                <div id="empty-offers" class="py-20 text-center hidden">
                    <i class="fa-solid fa-tags text-slate-200 text-6xl mb-4"></i>
                    <p class="text-slate-400 font-medium">No active offers. Start by adding one!</p>
                </div>
            </div>
        </main>
    </div>

    <div id="offer-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden transition-all duration-300">
        <div class="bg-white w-full max-w-2xl p-10 rounded-[2.5rem] shadow-2xl m-4 relative overflow-y-auto max-h-[90vh]">
            <button onclick="toggleModal('offer-modal')" class="absolute top-6 right-8 text-gray-400 hover:text-rose-500 transition-all">
                <i class="fa-solid fa-circle-xmark text-2xl"></i>
            </button>

            <div class="mb-8">
                <h3 id="modal-title" class="text-2xl font-black text-slate-900">Create New Offer</h3>
                <p class="text-sm text-gray-400 mt-1">Set discount rates for your pharmacy products.</p>
            </div>

            <form id="offer-form" class="space-y-6">
                <input type="hidden" id="offer-id"> 
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Product Name</label>
                        <input type="text" id="off-p-name" placeholder="Enter product name..." class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Original Price ($)</label>
                        <input type="number" id="off-p-price" placeholder="0.00" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Discount Percentage (%)</label>
                        <input type="number" id="off-percentage" placeholder="e.g. 10" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">About Offer/Product</label>
                    <textarea id="off-about" rows="3" placeholder="Special deal description..." class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-emerald-500 outline-none transition-all"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Product Image URL</label>
                    <input type="text" id="off-image" placeholder="https://link-to-image.com" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-emerald-500 outline-none transition-all">
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal('offer-modal')" class="flex-1 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all text-sm">Cancel</button>
                    <button type="submit" id="save-btn" class="flex-1 bg-[#064E3B] text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-emerald-800 transition-all text-sm">Save Offer</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDYzJkinF_J4ff9T5Bi9hESxlo_ue8Szs8",
            authDomain: "phrma-eb265.firebaseapp.com",
            projectId: "phrma-eb265",
            storageBucket: "phrma-eb265.firebasestorage.app",
            messagingSenderId: "79240146779",
            appId: "1:79240146779:web:d01a63247566aeb8ea347e"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const db = getFirestore(app);

        const offerForm = document.getElementById('offer-form');
        const offerList = document.getElementById('offer-list');
        const emptyState = document.getElementById('empty-offers');

        // 1. Read Data (Real-time)
        onSnapshot(collection(db, "offers"), (snapshot) => {
            offerList.innerHTML = "";
            if (snapshot.empty) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;

                    const row = `
                        <tr class="bg-white border border-slate-50 rounded-2xl group hover:bg-slate-50 transition-all">
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-4">
                                    <img src="${data.image}" class="w-10 h-10 rounded-xl object-cover bg-slate-100" onerror="this.src='https://via.placeholder.com/40'">
                                    <span class="font-bold text-slate-700">${data.name}</span>
                                </div>
                            </td>
                            <td class="px-6 py-5 font-bold text-slate-400 line-through">$ ${data.originalPrice}</td>
                            <td class="px-6 py-5 font-black text-rose-500">${data.discount}% OFF</td>
                            <td class="px-6 py-5">
                                <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase">Active</span>
                            </td>
                            <td class="px-6 py-5 text-right space-x-2">
                                <button onclick="editOffer('${id}')" class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white transition-all">
                                    <i class="fa-solid fa-pen-to-square text-xs"></i>
                                </button>
                                <button onclick="deleteOffer('${id}')" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all">
                                    <i class="fa-solid fa-trash text-xs"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    offerList.innerHTML += row;
                });
            }
        });

        // 2. Save or Update Data
        offerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('save-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            const id = document.getElementById('offer-id').value;
            const offerData = {
                name: document.getElementById('off-p-name').value,
                originalPrice: document.getElementById('off-p-price').value,
                discount: document.getElementById('off-percentage').value,
                about: document.getElementById('off-about').value,
                image: document.getElementById('off-image').value,
                updatedAt: new Date()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "offers", id), offerData);
                    alert("Offer updated successfully!");
                } else {
                    offerData.createdAt = new Date();
                    await addDoc(collection(db, "offers"), offerData);
                    alert("New offer added successfully!");
                }
                toggleModal('offer-modal');
                offerForm.reset();
            } catch (err) {
                console.error(err);
                alert("Error saving offer!");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Save Offer";
            }
        });

        // 3. Edit Function
        window.editOffer = async (id) => {
            const docRef = doc(db, "offers", id);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('offer-id').value = id;
                document.getElementById('off-p-name').value = data.name;
                document.getElementById('off-p-price').value = data.originalPrice;
                document.getElementById('off-percentage').value = data.discount;
                document.getElementById('off-about').value = data.about;
                document.getElementById('off-image').value = data.image;
                toggleModal('offer-modal', true);
            }
        };

        // 4. Delete Function
        window.deleteOffer = async (id) => {
            if (confirm("Are you sure you want to delete this offer?")) {
                await deleteDoc(doc(db, "offers", id));
            }
        };
    </script>

    <script>
        function toggleModal(modalId, isEdit = false) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modal-title');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                if(isEdit) {
                    title.innerText = "Edit Offer Details";
                } else {
                    title.innerText = "Create New Offer";
                    document.getElementById('offer-id').value = ""; 
                    document.getElementById('offer-form').reset();
                }
            } else {
                modal.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
